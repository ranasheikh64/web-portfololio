<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Portfolio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">RS.admin</div>
        <ul class="nav-menu">
            <li class="nav-item active" data-section="profile">Profile</li>
            <li class="nav-item" data-section="skills">Skills</li>
            <li class="nav-item" data-section="projects">Projects</li>
            <li class="nav-item" data-section="experience">Experience</li>
            <li class="nav-item" data-section="education">Education</li>
        </ul>
        <div class="sidebar-footer">
            <div id="logout-btn" class="btn-logout">Logout</div>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h2 id="section-title">Profile Settings</h2>
            <button id="add-btn" class="btn-add" style="display:none;">+ Add New</button>
        </header>

        <div id="content-area">
            <!-- Dynamic content injected here -->
        </div>
    </main>

    <!-- Modal for adding/editing -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Edit Item</h3>
            </div>
            <form id="modal-form">
                <div id="form-fields"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">Operation successful!</div>

    <script src="assets/js/dashboard.js"></script>
</body>

</html>
</body>

</html>
