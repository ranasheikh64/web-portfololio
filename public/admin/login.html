<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Portfolio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --flutter-sky: #54C5F8;
            --android-green: #3DDC84;
            --bg-dark: #050A14;
            --bg-card: #0D1525;
            --text-primary: #F0F4FF;
            --text-muted: #7A8BAA;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(84, 197, 248, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }

        .login-card h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--flutter-sky), var(--android-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--flutter-sky);
            background: rgba(84, 197, 248, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--flutter-sky), var(--android-green));
            border: none;
            border-radius: 12px;
            color: var(--bg-dark);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(84, 197, 248, 0.3);
        }

        .error-message {
            color: #ff4a4a;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        /* Decorative Orbs */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            filter: blur(80px);
            border-radius: 50%;
            z-index: 1;
        }

        .orb-1 {
            background: rgba(84, 197, 248, 0.15);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            background: rgba(61, 220, 132, 0.1);
            bottom: -100px;
            left: -100px;
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        <h1>Admin Portal</h1>
        <form id="login-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="admin@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Log In</button>
            <div id="error" class="error-message">Invalid credentials. Please try again.</div>
        </form>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/admin/';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const submitBtn = e.target.querySelector('button');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Loging in...';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('admin', JSON.stringify(data.admin));
                    window.location.href = '/admin/';
                } else {
                    errorDiv.innerText = data.message || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'Server error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Log In';
            }
        });
    </script>
</body>

</html>
